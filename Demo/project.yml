name: ADFReader
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
packages:
  ADFKit:
    path: ..
targets:
  ADFReader:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADFReader
      - path: ../Fixtures
        buildPhase: resources
    dependencies:
      - package: ADFKit
        product: ADFKit
      - package: ADFKit
        product: ADFYouTube
      - package: ADFKit
        product: ADFBeam
    info:
      path: ADFReader/Info.plist
      properties:
        CFBundleDisplayName: ADFReader
        # Keep the packaged plist in lockstep with the build settings —
        # xcodegen writes literal values, so without these the generated
        # Info.plist stays frozen at its first-generation numbers.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        NSCameraUsageDescription: Scans ADF Beam QR codes to import documents.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad multitasking (Split View / Slide Over) requires all four
        # orientations and resizable scenes (no UIRequiresFullScreen).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # No custom crypto and no HTTPS beyond Apple-exempt use, so the build
        # skips the Missing Compliance prompt that otherwise blocks TestFlight.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.connie.adfreader
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "17"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
        # The app defines no App Intents; skipping extraction silences the
        # appintentsmetadataprocessor "no dependency found" warning.
        LM_SKIP_METADATA_EXTRACTION: YES
        DEVELOPMENT_TEAM: G47HJC6S26
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Distribution signing is scoped to release so simulator and debug
        # runs keep working without the App Store profile.
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: ADFReader App Store
    scheme:
      testTargets: []
      gatherCoverageData: false
