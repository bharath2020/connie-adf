name: ADFReader
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
packages:
  ADFKit:
    path: ..
targets:
  ADFReader:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADFReader
      - path: ../Fixtures
        buildPhase: resources
    dependencies:
      - package: ADFKit
        product: ADFKit
    info:
      path: ADFReader/Info.plist
      properties:
        CFBundleDisplayName: ADFReader
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.connie.adfreader
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
        # The app defines no App Intents; skipping extraction silences the
        # appintentsmetadataprocessor "no dependency found" warning.
        LM_SKIP_METADATA_EXTRACTION: YES
    scheme:
      testTargets: []
      gatherCoverageData: false
