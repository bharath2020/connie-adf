<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ADF Beam — protocol round-trip test</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 2rem; }
    #result { font-size: 2rem; font-weight: 700; }
    .pass { color: #1a7f37; }
    .fail { color: #cf222e; }
    li.pass::before { content: "✓ "; }
    li.fail::before { content: "✗ "; }
  </style>
</head>
<body>
  <h1>ADF Beam protocol round-trip</h1>
  <div id="result">running…</div>
  <ul id="checks"></ul>
  <script src="lib/pako.min.js"></script>
  <script src="shared/protocol.js"></script>
  <script src="test-fixture.js"></script><!-- generated by make-fixture.mjs; defines ADF_BEAM_TEST_FIXTURE -->
  <script>
    const checks = [];
    function check(name, fn) {
      try { fn(); checks.push({ name, ok: true }); }
      catch (error) { checks.push({ name, ok: false, message: error.message }); }
    }
    const json = typeof ADF_BEAM_TEST_FIXTURE === 'string' ? ADF_BEAM_TEST_FIXTURE : null;
    check('fixture loaded (run make-fixture.mjs if this fails)', () => {
      if (!json) throw new Error('test-fixture.js missing');
    });
    if (json) {
      const protocol = ADFBeamProtocol;
      check('round-trip is byte-identical', () => {
        if (protocol.decodeFrames(protocol.encodeFrames(json, 'test-doc')) !== json) {
          throw new Error('output differs from input');
        }
      });
      check('round-trip survives shuffling and duplicates', () => {
        const frames = protocol.encodeFrames(json, 'test-doc', 400);
        const noisy = [...frames, ...frames.slice(0, 3)].sort(() => 0.5 - Math.random());
        if (protocol.decodeFrames(noisy) !== json) throw new Error('output differs from input');
      });
      check('malformed frames are rejected', () => {
        for (const bad of ['QRX1|d|0|1|aGk=', 'ADF1|d|0|1', 'ADF1|d|9|3|aGk=']) {
          let threw = false;
          try { protocol.parseFrame(bad); } catch { threw = true; }
          if (!threw) throw new Error('accepted ' + bad);
        }
      });
    }
    const ul = document.getElementById('checks');
    for (const c of checks) {
      const li = document.createElement('li');
      li.className = c.ok ? 'pass' : 'fail';
      li.textContent = c.name + (c.ok ? '' : ' — ' + c.message);
      ul.appendChild(li);
    }
    const allOk = checks.every((c) => c.ok);
    const result = document.getElementById('result');
    result.textContent = allOk ? 'PASS' : 'FAIL';
    result.className = allOk ? 'pass' : 'fail';
  </script>
</body>
</html>
